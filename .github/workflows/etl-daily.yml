name: ETL diario — DIGESETT

on:
  schedule:
    # Cada día a las 06:00 UTC (02:00 hora RD)
    - cron: '0 6 * * *'
  workflow_dispatch: # también permite trigger manual

jobs:
  etl:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        working-directory: scripts
        run: |
          pip install -r requirements.txt

      - name: Run DIGESETT ETL
        working-directory: scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python import_digesett.py

      - name: Resumen
        if: always()
        run: echo "ETL finalizado. Verificar logs y Supabase Dashboard."
