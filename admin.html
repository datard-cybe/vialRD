<!DOCTYPE html>
<html lang="es-DO">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Admin — VialRD</title>
  <meta name="robots" content="noindex, nofollow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,800&family=IBM+Plex+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23E63946'/%3E%3Cpath d='M7.5 9 L16 23 L24.5 9' stroke='%23FAFAF7' stroke-width='3' fill='none'/%3E%3Ccircle cx='16' cy='27' r='1.6' fill='%23FAFAF7'/%3E%3C/svg%3E" />

  <script>
    window.__ENV = {
      SUPABASE_URL: 'https://bmazvbpclpeprgdiijhw.supabase.co',
      SUPABASE_ANON_KEY: 'sb_publishable_cyBfZu00XW6-qe6V_IbtnQ_5QTJOHjQ'
    };
  </script>

  <style>
    body { background: var(--c-bg); }
    .admin-shell { max-width: 1400px; margin: 0 auto; padding: 24px; }
    .admin-head { display: flex; justify-content: space-between; align-items: center; padding-bottom: 16px; border-bottom: 2px solid var(--c-ink); margin-bottom: 24px; }
    .admin-title { font-family: var(--f-display); font-weight: 800; font-size: 1.8rem; }
    .admin-user { font-family: var(--f-mono); font-size: 0.85rem; color: var(--c-ink-mute); }

    .login-card { max-width: 420px; margin: 80px auto; background: #fff; border: 1px solid var(--c-line); padding: 32px; }
    .login-card h1 { font-family: var(--f-display); font-weight: 800; font-size: 1.6rem; margin-bottom: 8px; }
    .login-card p { color: var(--c-ink-mute); margin-bottom: 20px; font-size: 0.92rem; }
    .login-card input { width: 100%; padding: 12px; border: 1px solid var(--c-line); font-size: 1rem; margin-bottom: 12px; font-family: var(--f-mono); }
    .login-card button { width: 100%; padding: 12px; background: var(--c-ink); color: var(--c-bg); border: none; font-weight: 600; cursor: pointer; }
    .login-msg { margin-top: 12px; padding: 10px; font-size: 0.85rem; font-family: var(--f-mono); }
    .login-msg--ok { background: rgba(42,157,143,0.1); color: #1e7367; }
    .login-msg--err { background: rgba(230,57,70,0.1); color: #b8232f; }

    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
    @media (max-width: 700px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }
    .stat-box { background: #fff; border: 1px solid var(--c-line); padding: 14px; }
    .stat-box__num { font-family: var(--f-display); font-weight: 800; font-size: 1.8rem; line-height: 1; color: var(--c-ink); }
    .stat-box__label { font-family: var(--f-mono); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--c-ink-mute); margin-top: 6px; }
    .stat-box--red .stat-box__num { color: var(--c-accent); }
    .stat-box--yellow .stat-box__num { color: #c89e1f; }
    .stat-box--green .stat-box__num { color: #2a9d8f; }

    .filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-pill { padding: 8px 14px; background: transparent; border: 1px solid var(--c-line); color: var(--c-ink-soft); font-family: var(--f-mono); font-size: 0.82rem; cursor: pointer; transition: all 0.15s; }
    .filter-pill:hover { border-color: var(--c-ink); color: var(--c-ink); }
    .filter-pill.active { background: var(--c-ink); color: var(--c-bg); border-color: var(--c-ink); }

    .reports-table { width: 100%; background: #fff; border: 1px solid var(--c-line); border-collapse: collapse; }
    .reports-table th, .reports-table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--c-line); font-size: 0.88rem; vertical-align: top; }
    .reports-table th { background: var(--c-bg-cream); font-family: var(--f-mono); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }
    .reports-table tr:hover { background: var(--c-bg-cream); }
    .reports-table .photo-thumb { width: 50px; height: 50px; object-fit: cover; cursor: pointer; border: 1px solid var(--c-line); }
    .reports-table .photo-thumb:hover { transform: scale(1.08); transition: transform 0.15s; }
    .reports-table .desc-cell { max-width: 240px; font-size: 0.82rem; color: var(--c-ink-soft); }

    .tier-badge { display: inline-block; font-family: var(--f-mono); font-size: 0.65rem; padding: 3px 7px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; border-radius: 2px; }
    .tier-new { background: rgba(244,196,48,0.18); color: #8a6f0f; }
    .tier-confirmed { background: rgba(42,157,143,0.15); color: #1e7367; }
    .tier-popular { background: rgba(42,157,143,0.25); color: #1e7367; font-weight: 700; }
    .tier-evergreen { background: var(--c-ink); color: var(--c-bg); }
    .tier-removed, .tier-resolved { background: rgba(230,57,70,0.12); color: #b8232f; text-decoration: line-through; }

    .expire-cell { font-family: var(--f-mono); font-size: 0.78rem; }
    .expire-urgent { color: var(--c-accent); font-weight: 700; }
    .expire-soon { color: #c89e1f; }
    .expire-safe { color: #2a9d8f; }

    .row-actions button { font-family: var(--f-mono); font-size: 0.72rem; padding: 5px 10px; border: 1px solid var(--c-line); background: transparent; cursor: pointer; margin-right: 4px; transition: all 0.15s; }
    .row-actions button:hover { background: var(--c-ink); color: var(--c-bg); border-color: var(--c-ink); }
    .row-actions button.btn-danger:hover { background: var(--c-accent); border-color: var(--c-accent); }

    .empty-state { text-align: center; padding: 60px; color: var(--c-ink-mute); font-family: var(--f-mono); }

    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal-photo { max-width: 90%; max-height: 90vh; cursor: zoom-out; }

    .logout-btn { background: transparent; border: 1px solid var(--c-line); padding: 6px 12px; font-family: var(--f-mono); font-size: 0.8rem; cursor: pointer; }
    .logout-btn:hover { background: var(--c-accent); color: var(--c-bg); border-color: var(--c-accent); }

    .toast-admin { position: fixed; bottom: 20px; right: 20px; background: var(--c-ink); color: var(--c-bg); padding: 12px 18px; font-family: var(--f-mono); font-size: 0.85rem; z-index: 999; box-shadow: 0 6px 24px rgba(0,0,0,0.3); }
    .toast-admin--err { background: var(--c-accent); }

    @media (max-width: 900px) {
      .reports-table { font-size: 0.75rem; }
      .reports-table .desc-cell { max-width: 140px; }
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="loginView" class="login-card">
    <h1>Admin VialRD</h1>
    <p>Solo administradores. Te mandamos un magic link al email.</p>
    <input type="email" id="loginEmail" placeholder="tu@email.com" autocomplete="email" />
    <button id="loginBtn">Enviar magic link</button>
    <div id="loginMsg"></div>
  </div>

  <!-- DASHBOARD -->
  <main id="adminView" class="admin-shell" style="display:none">
    <div class="admin-head">
      <div>
        <div class="admin-title">Panel VialRD</div>
        <div class="admin-user" id="adminUser">—</div>
      </div>
      <div style="display:flex;gap:12px;align-items:center">
        <a href="/app.html" style="font-family:var(--f-mono);font-size:0.85rem;color:var(--c-ink-mute)">← Volver al mapa</a>
        <button class="logout-btn" id="logoutBtn">Cerrar sesión</button>
      </div>
    </div>

    <!-- Stats row -->
    <div class="stats-row">
      <div class="stat-box stat-box--green"><div class="stat-box__num" id="stat-total">—</div><div class="stat-box__label">Reportes activos</div></div>
      <div class="stat-box stat-box--yellow"><div class="stat-box__num" id="stat-new">—</div><div class="stat-box__label">Nuevos (<7 días)</div></div>
      <div class="stat-box stat-box--red"><div class="stat-box__num" id="stat-expiring">—</div><div class="stat-box__label">Expiran pronto</div></div>
      <div class="stat-box"><div class="stat-box__num" id="stat-removed">—</div><div class="stat-box__label">Removidos</div></div>
    </div>

    <!-- Filters -->
    <div class="filters">
      <button class="filter-pill active" data-filter="all">Todos</button>
      <button class="filter-pill" data-filter="pending">Nuevos (sin confirmar)</button>
      <button class="filter-pill" data-filter="verified">Verificados (3+ votos)</button>
      <button class="filter-pill" data-filter="expiring">Expiran en 3 días</button>
      <button class="filter-pill" data-filter="removed">Removidos</button>
      <button class="filter-pill" id="refreshBtn" style="margin-left:auto">↻ Refrescar</button>
    </div>

    <!-- Tabla -->
    <table class="reports-table">
      <thead>
        <tr>
          <th>Foto</th>
          <th>Tipo</th>
          <th>Descripción</th>
          <th>Provincia</th>
          <th>Sev</th>
          <th>Votos</th>
          <th>Tier</th>
          <th>Expira</th>
          <th>Creado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="reportsBody">
        <tr><td colspan="10" class="empty-state">Cargando…</td></tr>
      </tbody>
    </table>
  </main>

  <!-- Modal foto -->
  <div id="photoModal" class="modal-bg" style="display:none" onclick="this.style.display='none'">
    <img id="photoModalImg" class="modal-photo" alt="Foto reporte" />
  </div>

  <div id="toast" class="toast-admin" style="display:none"></div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    const supabase = createClient(window.__ENV.SUPABASE_URL, window.__ENV.SUPABASE_ANON_KEY);

    const TYPE_LABELS = {
      bache: 'Bache',
      policia_acostado_no_senalizado: 'Pol. acostado',
      cruce_peligroso: 'Cruce peligroso',
      zona_oscura: 'Zona oscura',
      semaforo_danado: 'Semáforo dañado',
      senal_caida: 'Señal caída',
      paso_peatonal_borrado: 'Paso borrado',
      curva_peligrosa: 'Curva',
      otro: 'Otro'
    };

    let currentFilter = 'all';

    function showToast(msg, isError = false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast-admin' + (isError ? ' toast-admin--err' : '');
      t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 3000);
    }

    // ====== AUTH ======
    document.getElementById('loginBtn').addEventListener('click', async () => {
      const email = document.getElementById('loginEmail').value.trim();
      const msg = document.getElementById('loginMsg');
      if (!email) { msg.textContent = 'Pon un email válido'; msg.className = 'login-msg login-msg--err'; return; }

      const { error } = await supabase.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: window.location.href }
      });

      if (error) {
        msg.textContent = 'Error: ' + error.message;
        msg.className = 'login-msg login-msg--err';
      } else {
        msg.textContent = '✓ Revisa tu email. Te llegó un link para entrar.';
        msg.className = 'login-msg login-msg--ok';
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await supabase.auth.signOut();
      location.reload();
    });

    // ====== LOAD ======
    async function checkSession() {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) {
        document.getElementById('loginView').style.display = 'block';
        document.getElementById('adminView').style.display = 'none';
        return false;
      }

      // Verificar que es admin
      const { data: adminCheck } = await supabase.from('admins').select('email, role').eq('email', session.user.email).maybeSingle();
      if (!adminCheck) {
        document.getElementById('loginView').style.display = 'block';
        document.getElementById('adminView').style.display = 'none';
        const msg = document.getElementById('loginMsg');
        msg.textContent = '⛔ No tienes permisos de admin (' + session.user.email + ')';
        msg.className = 'login-msg login-msg--err';
        await supabase.auth.signOut();
        return false;
      }

      document.getElementById('loginView').style.display = 'none';
      document.getElementById('adminView').style.display = 'block';
      document.getElementById('adminUser').textContent = adminCheck.email + ' · ' + adminCheck.role;
      return true;
    }

    async function loadReports(filter = 'all') {
      const tbody = document.getElementById('reportsBody');
      tbody.innerHTML = '<tr><td colspan="10" class="empty-state">Cargando…</td></tr>';

      const { data, error } = await supabase.rpc('admin_list_reports', { p_filter: filter, p_limit: 200 });

      if (error) {
        tbody.innerHTML = `<tr><td colspan="10" class="empty-state">Error: ${error.message}</td></tr>`;
        return;
      }
      if (!data || data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="10" class="empty-state">No hay reportes con este filtro</td></tr>';
        updateStats([]);
        return;
      }

      tbody.innerHTML = data.map(r => renderRow(r)).join('');
      updateStats(data);

      // Wire up buttons
      tbody.querySelectorAll('.btn-remove').forEach(btn => {
        btn.addEventListener('click', () => removeReport(btn.dataset.id));
      });
      tbody.querySelectorAll('.photo-thumb').forEach(img => {
        img.addEventListener('click', () => {
          document.getElementById('photoModalImg').src = img.src;
          document.getElementById('photoModal').style.display = 'flex';
        });
      });
    }

    function renderRow(r) {
      const photoHtml = r.photo_url
        ? `<img src="${r.photo_url}" class="photo-thumb" alt="" loading="lazy" />`
        : '<span style="color:#ccc;font-size:0.8rem">—</span>';

      const days = r.days_until_expire;
      let expireHtml;
      if (r.retention_tier === 'evergreen') expireHtml = '<span class="expire-cell expire-safe">∞ evergreen</span>';
      else if (r.retention_tier === 'removed' || r.retention_tier === 'resolved') expireHtml = '<span class="expire-cell" style="opacity:0.5">—</span>';
      else if (days === null) expireHtml = '—';
      else if (days < 0) expireHtml = `<span class="expire-cell expire-urgent">Vencido</span>`;
      else if (days < 3) expireHtml = `<span class="expire-cell expire-urgent">${days.toFixed(1)}d</span>`;
      else if (days < 7) expireHtml = `<span class="expire-cell expire-soon">${days.toFixed(0)}d</span>`;
      else expireHtml = `<span class="expire-cell expire-safe">${days.toFixed(0)}d</span>`;

      const createdAgo = relativeTime(r.created_at);

      const canRemove = r.retention_tier !== 'removed' && r.retention_tier !== 'resolved';

      return `
        <tr>
          <td>${photoHtml}</td>
          <td><strong>${TYPE_LABELS[r.type] || r.type}</strong></td>
          <td class="desc-cell">${r.description || '<em style="color:#aaa">sin descripción</em>'}</td>
          <td>${r.province || '—'}</td>
          <td>${'★'.repeat(r.severity || 0)}</td>
          <td><strong>${r.vote_count || 0}</strong>${r.resolved_votes > 0 ? ` <span style="color:#b8232f">+${r.resolved_votes} resueltos</span>` : ''}</td>
          <td><span class="tier-badge tier-${r.retention_tier}">${r.retention_tier}</span></td>
          <td>${expireHtml}</td>
          <td style="font-family:var(--f-mono);font-size:0.78rem;color:var(--c-ink-mute)">${createdAgo}</td>
          <td class="row-actions">
            ${canRemove ? `<button class="btn-remove btn-danger" data-id="${r.id}">Quitar</button>` : ''}
            <a href="/app.html?focus_lng=${r.lng}&focus_lat=${r.lat}" target="_blank"><button>Ver en mapa</button></a>
          </td>
        </tr>
      `;
    }

    function updateStats(reports) {
      const active = reports.filter(r => !['removed', 'resolved'].includes(r.retention_tier));
      const newOnes = active.filter(r => r.retention_tier === 'new');
      const expiring = active.filter(r => r.days_until_expire !== null && r.days_until_expire < 3 && r.days_until_expire >= 0);
      const removed = reports.filter(r => ['removed', 'resolved'].includes(r.retention_tier));

      document.getElementById('stat-total').textContent = active.length;
      document.getElementById('stat-new').textContent = newOnes.length;
      document.getElementById('stat-expiring').textContent = expiring.length;
      document.getElementById('stat-removed').textContent = removed.length;
    }

    function relativeTime(ts) {
      const d = new Date(ts);
      const diff = (Date.now() - d) / 1000;
      if (diff < 60) return 'hace seg';
      if (diff < 3600) return `hace ${Math.round(diff/60)}min`;
      if (diff < 86400) return `hace ${Math.round(diff/3600)}h`;
      if (diff < 86400 * 7) return `hace ${Math.round(diff/86400)}d`;
      return d.toLocaleDateString('es-DO');
    }

    async function removeReport(id) {
      if (!confirm('¿Seguro de quitar este reporte del mapa?')) return;
      const reason = prompt('Razón (opcional):', 'admin_removed') || 'admin_removed';
      const { data, error } = await supabase.rpc('admin_remove_report', { p_report_id: id, p_reason: reason });
      if (error) { showToast('Error: ' + error.message, true); return; }
      if (data && data.success) {
        showToast('✓ Reporte removido');
        loadReports(currentFilter);
      } else {
        showToast('No autorizado', true);
      }
    }

    // ====== Filters ======
    document.querySelectorAll('.filter-pill[data-filter]').forEach(pill => {
      pill.addEventListener('click', () => {
        document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
        currentFilter = pill.dataset.filter;
        loadReports(currentFilter);
      });
    });

    document.getElementById('refreshBtn').addEventListener('click', () => loadReports(currentFilter));

    // ====== Init ======
    (async () => {
      const ok = await checkSession();
      if (ok) await loadReports('all');

      supabase.auth.onAuthStateChange(async (event) => {
        if (event === 'SIGNED_IN') {
          const ok = await checkSession();
          if (ok) await loadReports('all');
        }
      });
    })();
  </script>
</body>
</html>
